<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BPC Engineering Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    #infoModal { z-index: 10000 !important; }
    #confirmModal { z-index: 9995 !important; }
    #loginModal { z-index: 9990 !important; }
    #guestModal { z-index: 9985 !important; }
    #historyModal { z-index: 9982 !important; }
    #modal, #addModal { z-index: 9980 !important; }
    .hidden { display: none; }
    
    .loader {
      border-top-color: #3498db;
      -webkit-animation: spinner 1.5s linear infinite;
      animation: spinner 1.5s linear infinite;
    }
    @-webkit-keyframes spinner { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 p-2 md:p-6 text-slate-800 antialiased">

<div id="infoModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-100">
    <div id="infoIcon" class="text-5xl mb-4">✅</div>
    <h3 id="infoTitle" class="text-xl font-bold mb-2 text-gray-800">สำเร็จ!</h3>
    <p id="infoMessage" class="text-gray-500 mb-8 font-medium text-sm"></p>
    <button onclick="closeInfoModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl w-full font-bold shadow-md shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all">ตกลง</button>
  </div>
</div>

<div id="confirmModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center border border-gray-100">
    <div id="confirmIcon" class="text-5xl mb-3">❓</div>
    <h3 id="confirmTitle" class="text-lg font-bold mb-2 text-gray-800">ยืนยันการทำรายการ</h3>
    <p id="confirmMessage" class="text-sm text-gray-500 mb-6 font-medium px-2"></p>
    <div class="flex gap-3">
      <button id="btnConfirmYes" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl w-full font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition-all">ตกลง</button>
      <button onclick="closeConfirmModal()" class="bg-gray-100 text-gray-600 px-4 py-2.5 rounded-xl w-full font-bold hover:bg-gray-200 transition-all">ยกเลิก</button>
    </div>
  </div>
</div>

<div id="guestModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
    <h2 id="lang-guestModalTitle" class="text-lg font-bold mb-4 text-blue-800 border-b pb-2 flex items-center gap-2">📝 ระบุข้อมูลทำรายการ</h2>
    <div class="space-y-4">
      <div id="div_guest_name">
        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-wider">ชื่อผู้เบิก / ผู้ทำรายการ *</label>
        <input id="guest_name_input" type="text" placeholder="พิมพ์ชื่อ-นามสกุลของคุณ..." class="w-full p-3 mt-1 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500 font-bold transition-all">
      </div>
      <div id="div_trans_line" class="hidden">
        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-wider">เลือก Line ที่นำอะไหล่ไปใช้ *</label>
        <input id="trans_line_input" list="machineLines" placeholder="เลือกหรือพิมพ์ชื่อ Line เครื่องจักร..." class="w-full p-3 mt-1 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500 font-bold transition-all uppercase">
        <datalist id="machineLines"></datalist>
      </div>
      <div class="flex gap-3 pt-2">
        <button id="confirmGuestBtn" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl w-full font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition-all">ตกลง</button>
        <button id="lang-guestCancelBtn" onclick="closeGuestModal()" class="bg-gray-100 text-gray-600 px-4 py-2.5 rounded-xl w-full font-bold hover:bg-gray-200 transition-all">ยกเลิก</button>
      </div>
    </div>
  </div>
</div>

<div id="loginModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-100">
    <div class="text-4xl mb-3">🔐</div>
    <h3 id="lang-loginModalTitle" class="text-xl font-bold mb-6 text-gray-800">เข้าสู่ระบบ (Staff/Admin)</h3>
    <div class="space-y-4">
      <div class="text-left">
        <label class="text-xs font-bold text-gray-400 uppercase ml-1 tracking-wider">Username</label>
        <input id="login_user" type="text" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
      </div>
      <div class="text-left">
        <label class="text-xs font-bold text-gray-400 uppercase ml-1 tracking-wider">Password</label>
        <input id="login_pass" type="password" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
      </div>
    </div>
    <div class="flex flex-col gap-2 mt-8">
      <button onclick="submitLogin()" id="btnSubmitLogin" class="bg-blue-600 text-white px-4 py-3 rounded-xl w-full font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">เข้าสู่ระบบ</button>
      <button id="lang-loginCancelBtn" onclick="closeLoginModal()" class="text-gray-400 hover:text-gray-600 px-4 py-2 text-sm font-medium transition-all">ยกเลิก</button>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md overflow-y-auto max-h-[90vh] border border-gray-100">
    <h2 id="lang-editModalTitle" class="text-xl font-bold mb-4 border-b pb-2 text-blue-800 flex items-center gap-2">✏️ แก้ไขข้อมูลสินค้า</h2>
    <input id="edit_original_id" type="hidden">
    
    <div id="adminStockControl" class="mb-5 p-4 bg-red-50 border border-red-100 rounded-xl hidden flex-col gap-3">
      <div id="zoneDelete" class="flex flex-col gap-2 border-b border-red-200 pb-3">
        <label class="text-xs font-bold text-red-600 uppercase tracking-wide">Danger Zone: ลบข้อมูลถาวร</label>
        <button onclick="requestDelete()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap shadow-sm flex items-center justify-center gap-2">🗑️ ลบอะไหล่ชิ้นนี้ออกจากฐานข้อมูล</button>
      </div>
      <div id="zoneAdjust">
        <label id="lang-adminControlLabel" class="text-xs font-bold text-red-600 uppercase tracking-wide">adjustStock: ปรับยอดสต็อกตามจริง</label>
        <div class="flex gap-2 mt-2">
          <input id="adj_quantity" type="number" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm font-bold text-center focus:border-red-500 outline-none" placeholder="ระบุจำนวนจริงในคลัง...">
          <button id="lang-adminAdjustBtn" onclick="saveStockAdjust(event)" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-bold transition-all whitespace-nowrap shadow-sm">ปรับยอด</button>
        </div>
      </div>
    </div>

    <div class="space-y-4">
      <div><label class="text-xs font-bold text-red-500 uppercase ml-1 tracking-wider">ID (รหัสอะไหล่)</label><input id="edit_id" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label class="text-xs text-gray-400 font-bold uppercase ml-1 tracking-wider">Part Number</label><input id="edit_part" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label class="text-xs text-gray-400 font-bold uppercase ml-1 tracking-wider">Model</label><input id="edit_model" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label class="text-xs text-gray-400 font-bold uppercase ml-1 tracking-wider">Line / Machine</label><input id="edit_machine" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label class="text-xs text-gray-400 font-bold uppercase ml-1 tracking-wider">Category</label><input id="edit_category" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label class="text-xs text-gray-400 font-bold uppercase ml-1 tracking-wider">Price (ราคา)</label><input type="number" id="edit_price" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label class="text-xs text-gray-400 font-bold uppercase ml-1 tracking-wider">Detail</label><textarea id="edit_detail" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm h-20 focus:border-blue-500 outline-none mt-1 resize-none"></textarea></div>
      <div class="p-3 bg-blue-50/50 border border-blue-100 rounded-xl">
        <label id="lang-editUploadLabel" class="text-xs font-bold text-blue-600 block mb-1">📸 เปลี่ยนรูปภาพใหม่ (อัปโหลดทันที)</label>
        <input type="file" onchange="uploadEditImage(this)" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
        <p id="edit_file_status" class="text-[10px] mt-1 hidden font-bold"></p> 
      </div>
    </div>
    
    <div class="flex gap-2 mt-6 border-t pt-4">
      <button id="btnSaveEdit" onclick="saveEdit()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl w-full font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition-all">บันทึกข้อมูล</button>
      <button id="lang-editCloseBtn" onclick="closeModal()" class="bg-gray-100 text-gray-500 px-4 py-2.5 rounded-xl w-full font-bold hover:bg-gray-200 transition-all">ปิด</button>
    </div>
  </div>
</div>

<div id="addModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md overflow-y-auto max-h-[90vh] border border-gray-100">
    <h2 id="lang-addModalTitle" class="text-xl font-bold mb-4 border-b pb-2 text-blue-600 flex items-center gap-2">🆕 เพิ่มรายการอะไหล่ใหม่</h2>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-bold text-red-500 tracking-wider ml-1">ID *</label><input id="add_id" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1" placeholder="เช่น E001"></div>
        <div><label class="text-xs text-gray-400 font-bold tracking-wider ml-1">Part Number</label><input id="add_part" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      </div>
      <div><label class="text-xs font-bold text-red-500 tracking-wider ml-1">Model *</label><input id="add_model" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label id="lang-addLabelMachine" class="text-xs font-bold text-red-500 tracking-wider ml-1">Machine *</label><input id="add_machine" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label id="lang-addLabelCategory" class="text-xs font-bold text-red-500 tracking-wider ml-1">Category *</label><input id="add_category" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label id="lang-addLabelPrice" class="text-xs font-bold text-red-500 tracking-wider ml-1">Price *</label><input type="number" id="add_price" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm focus:border-blue-500 outline-none mt-1"></div>
      <div><label id="lang-addLabelDetail" class="text-xs font-bold text-red-500 tracking-wider ml-1">Detail *</label><textarea id="add_detail" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm h-16 focus:border-blue-500 outline-none mt-1 resize-none"></textarea></div>
      <div><label id="lang-addLabelStock" class="text-xs text-gray-400 font-bold tracking-wider ml-1">สต็อกเริ่มต้น</label><input type="number" id="add_quantity" value="0" class="w-full border border-gray-200 p-2.5 rounded-xl text-sm text-center focus:border-blue-500 outline-none mt-1"></div>
      <div class="p-4 bg-orange-50/50 border border-orange-100 rounded-xl">
        <label id="lang-addLabelUpload" class="text-xs font-bold text-orange-600 block mb-1">📸 อัปโหลดรูปภาพประกอบ (ถ้ามี)</label>
        <input type="file" id="add_file" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-orange-100 file:text-orange-700 hover:file:bg-orange-200 cursor-pointer">
      </div>
    </div>
    
    <div class="flex gap-2 mt-6 border-t pt-4">
      <button onclick="saveNewItem()" id="btnSaveNew" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl w-full font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition-all">บันทึกรายการ</button>
      <button id="lang-addCancelBtn" onclick="closeAddModal()" class="bg-gray-100 text-gray-500 px-4 py-2.5 rounded-xl w-full font-bold hover:bg-gray-200 transition-all">ยกเลิก</button>
    </div>
  </div>
</div>

<div id="historyModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm z-[9985]">
  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-4xl overflow-y-auto max-h-[85vh] border border-gray-100">
    <div class="flex justify-between items-center mb-4 border-b pb-3">
      <h2 id="lang-historyModalTitle" class="text-xl font-bold text-indigo-800 flex items-center gap-2">📜 ประวัติการทำรายการล่าสุด</h2>
      <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-red-500 font-bold text-2xl transition-colors">×</button>
    </div>
    <div class="overflow-x-auto rounded-xl border border-gray-200">
      <table class="w-full text-left text-sm whitespace-nowrap">
        <thead class="bg-gray-100 text-gray-600 uppercase text-xs font-bold border-b border-gray-200">
          <tr>
            <th class="p-3">วัน-เวลา</th><th class="p-3">ผู้ทำรายการ</th><th class="p-3">ประเภท</th>
            <th class="p-3">ID อะไหล่</th><th class="p-3">Model</th><th class="p-3 text-center">Line</th><th class="p-3 text-center">จำนวน</th>
          </tr>
        </thead>
        <tbody id="historyTableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <div id="historyPagination" class="flex justify-between items-center mt-4 border-t border-gray-100 pt-4 px-2"></div>
    <div id="historyLoading" class="text-center py-10 text-gray-400 font-bold hidden flex-col items-center gap-3">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>กำลังโหลดข้อมูลประวัติ...
    </div>
  </div>
</div>

<div class="max-w-6xl mx-auto">
  <div class="flex items-center justify-between mb-4 border-b pb-4 border-gray-200/60">
    <h1 onclick="goHome()" class="text-2xl md:text-3xl font-extrabold text-blue-900 flex items-center gap-2 tracking-tight cursor-pointer hover:opacity-80 transition-all select-none" title="กลับหน้าแรก / Go Home">📦 BPC Engineering Store</h1>
    <div class="flex bg-gray-200/80 p-1 rounded-xl border border-gray-300/40 text-xs font-bold shadow-inner">
      <button id="langBtn-th" onclick="switchLanguage('th')" class="px-3 py-1.5 rounded-lg transition-all bg-white text-blue-600 shadow-sm">TH</button>
      <button id="langBtn-en" onclick="switchLanguage('en')" class="px-3 py-1.5 rounded-lg transition-all text-gray-500 hover:text-slate-800">EN</button>
    </div>
  </div>

  <div class="flex flex-col md:flex-row gap-4 mb-3 items-stretch md:items-center">
    <button id="addBtn" onclick="openAddModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition-all hidden whitespace-nowrap">➕ เพิ่มอะไหล่ใหม่</button>
    <button id="historyBtn" onclick="openHistoryModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-md shadow-indigo-100 hover:bg-indigo-700 transition-all hidden whitespace-nowrap">📜 ประวัติการเบิก-จ่าย</button>

    <div class="relative flex-1">
      <input id="search" placeholder="🔍 ค้นหารหัสพาร์ท, ชื่อโมเดล หรือประเภท..." class="w-full p-3 pl-4 border border-gray-200 rounded-xl shadow-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white transition-all font-medium" onchange="currentPage=1; loadData()">
    </div>
    
    <div class="flex items-center justify-between md:justify-end gap-3 bg-white p-2 rounded-xl border border-gray-200 shadow-sm px-4">
      <span id="displayUserName" class="text-xs font-bold text-gray-500 tracking-wide">สถานะ: Guest</span>
      <button onclick="login()" id="loginBtn" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold shadow hover:bg-black transition-all">🔑 Login (Staff/Admin)</button>
      <button onclick="logout()" id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold shadow hover:bg-red-600 transition-all hidden">🚪 ออกจากระบบ</button>
    </div>
  </div>

  <div class="flex flex-wrap items-center gap-2 mb-6">
    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mr-1">หมวดหมู่:</span>
    <button onclick="setCategoryFilter('')" id="btn-cat-all" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold bg-blue-600 text-white shadow-sm transition-all border border-transparent">🏷️ ทั้งหมด (All)</button>
    <button onclick="setCategoryFilter('E')" id="btn-cat-E" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 shadow-sm transition-all">⚡ Electronic (E)</button>
    <button onclick="setCategoryFilter('M')" id="btn-cat-M" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 shadow-sm transition-all">⚙️ Mechanic (M)</button>
    <button onclick="setCategoryFilter('X')" id="btn-cat-X" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 shadow-sm transition-all">🔄 Mixing (X)</button>
  </div>

  <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<div class="flex flex-col items-center gap-3 my-12 pb-12">
  <div id="pagination-container" class="flex flex-wrap justify-center items-center gap-2"></div>
  <div id="total-info" class="text-xs text-gray-400 font-bold tracking-wider"></div>
</div>

<script>
// ⚠️ สำคัญที่สุด: วาง Web App URL ตัวใหม่ล่าสุดของคุณที่นี่
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbeXFbqCNYA6F0GRiLXfK9WMizCXBZdrrdUQae10p_U-h018VQc6UbnhWS2yDBvHl-Aw/exec"; 

// ---------- ตัวแปรระบบ ----------
let allData = [];
let currentPage = 1;
let userRole = 0;              
let currentUserName = "Guest";
let pendingUpdate = null;
let resolveConfirm;
let currentLang = "th";
let currentCategoryFilter = "";

// 💡 [NEW] ฟังก์ชันหลักสำหรับส่งข้อมูลคุยกับ Google Apps Script
async function fetchAPI(action, data = {}) {
  try {
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: action, data: data })
    });
    return await response.json();
  } catch (err) {
    console.error("API Error:", err);
    return { status: "error", message: "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้" };
  }
}

  // ตรวจสอบว่าโดนเด้งมาจาก QR Code (ที่มีพารามิเตอร์ search หรือ id) หรือไม่
  const urlParams = new URLSearchParams(window.location.search);
  const initialSearch = urlParams.get('search') || urlParams.get('id'); 
  if (initialSearch && initialSearch.trim() !== "") { 
    document.getElementById("search").value = initialSearch;
    currentPage = 1; 
  }

async function loadMachineLines() {
  const res = await fetchAPI('getMachineLines');
  if(res.status === "success") {
    machineLinesList = res.data;
    const datalist = document.getElementById("machineLines");
    datalist.innerHTML = "";
    machineLinesList.forEach(line => {
      let option = document.createElement("option");
      option.value = line;
      datalist.appendChild(option);
    });
  }
}

function setCategoryFilter(prefix) {
  currentCategoryFilter = prefix;
  currentPage = 1;
  const btns = ['all', 'E', 'M', 'X'];
  btns.forEach(b => {
    const btnEl = document.getElementById('btn-cat-' + b);

    if ((b === 'all' && prefix === '') || (b === prefix)) {

function switchLanguage(lang) {

  if (lang === "th") {

async function loadData() {
  const container = document.getElementById("products");
  const t = translations[currentLang];
  container.innerHTML = `
    <div class="col-span-full text-center py-24 text-gray-400 font-bold flex flex-col items-center justify-center gap-3">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>
      <div class="animate-pulse tracking-wide text-sm">${t.loadingText}</div>
    </div>`;
    
  const searchKeyword = document.getElementById("search").value;

  // ปรับ URL สวยๆ ให้ผู้ใช้ก๊อปปี้ไปส่งต่อได้
  if (window.history.replaceState) {
    const newUrl = new URL(window.location);
    if (searchKeyword) newUrl.searchParams.set('search', searchKeyword);
    else newUrl.searchParams.delete('search');
    window.history.replaceState({}, '', newUrl);
  }
  
  const res = await fetchAPI('getProducts', { page: currentPage, search: searchKeyword, categoryPrefix: currentCategoryFilter });
  allData = res.items || [];
  render();
  updatePaginationUI(res.totalPages || 0);
}

function update(id, type) {
  const qtyInput = document.getElementById("qty_" + id);
  const qty = parseInt(qtyInput.value);
  if (currentLang === "th") {
    if (!qty || qty <= 0) return showInfoModal("แจ้งเตือน", "กรุณาระบุจำนวนอะไหล่ที่ถูกต้องและมากกว่า 0", "⚠️");
  } else {
    if (!qty || qty <= 0) return showInfoModal("Warning", "Please specify a correct quantity greater than 0", "⚠️");
  }
  
  pendingUpdate = { id, type, qty };
  if (type === "OUT") {
    document.getElementById("guest_name_input").value = userRole === 0 ? "" : currentUserName;
    document.getElementById("div_guest_name").style.display = userRole === 0 ? "block" : "none";
    document.getElementById("div_trans_line").style.display = "block";
    document.getElementById("trans_line_input").value = "";
    document.getElementById("lang-guestModalTitle").innerHTML = currentLang === "th" ? "📤 ระบุรายละเอียดการเบิกออก" : "📤 Check-out Details";
    document.getElementById("guestModal").classList.remove("hidden");
    setTimeout(() => {
        if (userRole === 0) document.getElementById("guest_name_input").focus();
        else document.getElementById("trans_line_input").focus();
    }, 100);
  } else {
    if (userRole === 0) {
      document.getElementById("guest_name_input").value = "";
      document.getElementById("div_guest_name").style.display = "block";
      document.getElementById("div_trans_line").style.display = "none"; 
      document.getElementById("trans_line_input").value = "-";
      document.getElementById("lang-guestModalTitle").innerHTML = currentLang === "th" ? "📝 ระบุชื่อผู้ทำรายการ" : "📝 Enter Name";
      document.getElementById("guestModal").classList.remove("hidden");
      setTimeout(() => document.getElementById("guest_name_input").focus(), 100);
    } else {
      executeAction(id, type, qty, currentUserName, "-");
    }
  }
}

document.getElementById("confirmGuestBtn").onclick = function() {
  const name = document.getElementById("guest_name_input").value.trim();
  if (!name) return showInfoModal(currentLang === "th" ? "แจ้งเตือน" : "Warning", currentLang === "th" ? "จำเป็นต้องระบุชื่อของคุณเพื่อลงบันทึกรายงานประวัติ" : "Name input is vital for server inventory audittrail logs", "⚠️");
  let lineVal = "-";
  if (pendingUpdate.type === "OUT") {
    lineVal = document.getElementById("trans_line_input").value.trim().toUpperCase();
    if (!lineVal) return showInfoModal(currentLang === "th" ? "แจ้งเตือน" : "Warning", currentLang === "th" ? "กรุณาเลือกหรือพิมพ์ชื่อ Line ที่นำอะไหล่ไปใช้งาน" : "Please select or enter the Line/Machine", "⚠️");
  }
  executeAction(pendingUpdate.id, pendingUpdate.type, pendingUpdate.qty, name, lineVal);
  closeGuestModal();
};

async function executeAction(id, type, qty, userName, line = "-") {
  let actionText = type === "IN" ? (currentLang === "th" ? "รับเข้าพาร์ท" : "Stock In") : (currentLang === "th" ? "เบิกออกสินค้า" : "Stock Out");
  let confirmTitle = currentLang === "th" ? `ยืนยันการ${actionText}` : `Confirm ${actionText}`;
  let confirmMsg = "";
  if (currentLang === "th") {
    confirmMsg = type === "OUT" ? `คุณต้องการเบิกออกจำนวน ${qty} ชิ้น ไปใช้ที่ไลน์ "${line}" โดย "${userName}" ใช่หรือไม่?` : `คุณต้องการรับเข้าจำนวน ${qty} ชิ้น โดย "${userName}" ใช่หรือไม่?`;
  } else {
    confirmMsg = type === "OUT" ? `Checkout ${qty} units to Line "${line}" by "${userName}"?` : `Process ${actionText} of ${qty} units by "${userName}"?`;
  }
  
  const isConfirmed = await niceConfirm(confirmTitle, confirmMsg, type === "IN" ? "📥" : "📤");
  if (!isConfirmed) return;
  
  // เรียกใช้งานผ่าน fetch API
  const res = await fetchAPI('updateStock', { id: id, qty: qty, type: type, user: userName, line: line });
  
  if (res.status === "success") { 
    if (currentLang === "th") showInfoModal("ทำรายการสำเร็จ", `บันทึกประวัติการ ${actionText} เรียบร้อยแล้ว`, "✅");
    else showInfoModal("Success", `Transaction for ${actionText} has been recorded.`, "✅");
    loadData();
    loadMachineLines();
  } else { 
    showInfoModal(currentLang === "th" ? "ทำรายการล้มเหลว" : "Transaction Failed", res.message, "❌"); 
  }
}

function uploadEditImage(input) {
  const id = document.getElementById("edit_original_id").value;
  const file = input.files[0];
  const statusLabel = document.getElementById("edit_file_status");
  if (!file || !id) return;

  statusLabel.classList.remove("hidden", "text-red-500", "text-green-500");
  statusLabel.classList.add("text-blue-500");
  statusLabel.innerText = currentLang === "th" ? "⏳ กำลังอัปโหลดรูปภาพเข้าสู่ระบบ..." : "⏳ Uploading product image to server...";

  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result.split(',')[1];
    input.disabled = true;
    
    const res = await fetchAPI('uploadAndSaveImage', { id: id, base64: base64, fileName: "part_" + id + "_" + file.name });
    input.disabled = false;
    
    if (res.status === "success") {
      statusLabel.className = "text-[10px] mt-1 font-bold text-green-500";
      statusLabel.innerText = currentLang === "th" ? "อัปโหลดรูปภาพใหม่เสร็จสิ้น! ✅" : "Part image updated successfully! ✅";
      if (typeof loadData === "function") loadData();
    } else {
      statusLabel.className = "text-[10px] mt-1 font-bold text-red-500";
      statusLabel.innerText = (currentLang === "th" ? "เกิดข้อผิดพลาด: " : "Error occurred: ") + res.message;
    }
  };
  reader.readAsDataURL(file);
}

async function saveEdit() {
  const btn = document.getElementById("btnSaveEdit");
  const data = {
    original_id: document.getElementById("edit_original_id").value, id: document.getElementById("edit_id").value,
    part: document.getElementById("edit_part").value, model: document.getElementById("edit_model").value,
    machine: document.getElementById("edit_machine").value, category: document.getElementById("edit_category").value,
    price: document.getElementById("edit_price").value, detail: document.getElementById("edit_detail").value
  };
  if (!data.id) return showInfoModal(currentLang === "th" ? "เตือน" : "Warning", currentLang === "th" ? "ไม่พบ ID อะไหล่" : "Part ID not found", "⚠️");
  
  btn.disabled = true;
  btn.innerText = currentLang === "th" ? "⏳ กำลังบันทึกข้อมูล..." : "⏳ Saving data...";
  
  const res = await fetchAPI('updateProduct', data);
  btn.disabled = false;
  btn.innerText = translations[currentLang].btnSaveEdit;
  
  if (res.status === "success") {
    closeModal();
    showInfoModal(currentLang === "th" ? "สำเร็จ" : "Success", currentLang === "th" ? "แก้ไขปรับเปลี่ยนข้อมูลอะไหล่ทั่วไปเรียบร้อย" : "General part data has been modified", "✅");
    loadData();
  } else { showInfoModal(currentLang === "th" ? "ผิดพลาด" : "Error", res.message, "❌"); }
}

async function requestDelete() {
  const id = document.getElementById("edit_original_id").value;
  if (!id) return;
  const confirm1 = await niceConfirm(currentLang === "th" ? "แจ้งเตือนการลบ (1/2)" : "Delete Warning (1/2)", currentLang === "th" ? `คุณแน่ใจหรือไม่ว่าต้องการลบอะไหล่ ID: ${id} ?` : `Are you sure you want to delete part ID: ${id}?`, "🗑️");
  if (!confirm1) return;

  const confirm2 = await niceConfirm(currentLang === "th" ? "ยืนยันขั้นเด็ดขาด (2/2)" : "Final Confirmation (2/2)", currentLang === "th" ? `ข้อมูล ID: ${id} จะถูกลบออกจากฐานข้อมูลถาวร! ยืนยันการลบหรือไม่?` : `Data for ID: ${id} will be permanently deleted! Confirm deletion?`, "⚠️");
  if (!confirm2) return;
  
  const res = await fetchAPI('deleteItem', { id: id, adminName: currentUserName });
  if (res.status === "success") {
    closeModal();
    showInfoModal(currentLang === "th" ? "ลบสำเร็จ" : "Deleted", currentLang === "th" ? "ลบข้อมูลอะไหล่เรียบร้อยแล้ว" : "Part data deleted successfully", "✅");
    loadData();
  } else { showInfoModal(currentLang === "th" ? "ข้อผิดพลาด" : "Error", res.message, "❌"); }
}

async function saveStockAdjust(event) {
  const id = document.getElementById("edit_original_id").value;
  const newQty = document.getElementById("adj_quantity").value;
  if (currentLang === "th") { if (!id || newQty === "" || Number(newQty) < 0) return showInfoModal("เตือน", "กรุณาระบุจำนวนสต็อกให้ถูกต้อง", "⚠️"); } 
  else { if (!id || newQty === "" || Number(newQty) < 0) return showInfoModal("Warning", "Please input a valid stock number", "⚠️"); }
  
  let confirmTitle = currentLang === "th" ? "ยืนยันปรับยอดรวม" : "Confirm adjustment";
  let confirmMsg = currentLang === "th" ? `ต้องการปรับ ID: ${id} ให้กลายเป็นยอดจำนวนจริงที่ ${newQty} ชิ้น?` : `Sync part ID: ${id} to real count at ${newQty} units?`;
  const isConfirmed = await niceConfirm(confirmTitle, confirmMsg, "🔧");
  if (!isConfirmed) return;

  const btn = event.target;
  btn.disabled = true;
  btn.innerText = currentLang === "th" ? "กำลังคำนวณ..." : "Processing...";

  const res = await fetchAPI('adjustStock', { id: id, newQty: newQty, adminName: currentUserName });
  btn.disabled = false;
  btn.innerText = translations[currentLang].adminAdjustBtn;
  if (res.status === "success") {
    closeModal();
    showInfoModal(currentLang === "th" ? "ปรับสต็อกสำเร็จ" : "Adjust Successful", currentLang === "th" ? "ปรับจำนวนเรียบร้อย" : "Stock count updated completely", "✅");
    loadData();
  } else { showInfoModal(currentLang === "th" ? "เกิดข้อผิดพลาด" : "Error", res.message, "❌"); }
}

function saveNewItem() {
  const btn = document.getElementById("btnSaveNew");
  const fileInput = document.getElementById("add_file");
  const data = {
    id: document.getElementById("add_id").value, part: document.getElementById("add_part").value,
    model: document.getElementById("add_model").value, machine: document.getElementById("add_machine").value,
    category: document.getElementById("add_category").value, price: document.getElementById("add_price").value,
    detail: document.getElementById("add_detail").value, quantity: document.getElementById("add_quantity").value
  };
  
  if (!data.id || !data.machine || !data.category || !data.price || !data.detail) {
    return showInfoModal(currentLang === "th" ? "แจ้งเตือน" : "Warning", currentLang === "th" ? "กรุณากรอกข้อมูลช่องที่มีดาวแดง (*) ให้ครบถ้วน" : "Please fill in all mandatory fields containing red asterisks (*)", "⚠️");
  }

  btn.disabled = true;
  btn.innerText = currentLang === "th" ? "⏳ กำลังบันทึก..." : "⏳ Saving...";
  
  if (fileInput.files.length > 0) {
    const reader = new FileReader();
    reader.onload = function(e) {
      data.image = { base64: e.target.result.split(',')[1], type: fileInput.files[0].type, name: fileInput.files[0].name };
      sendNewItemToServer(data);
    };
    reader.readAsDataURL(fileInput.files[0]);
  } else { sendNewItemToServer(data); }
}

async function sendNewItemToServer(data) {
  const res = await fetchAPI('addNewProduct', data);
  const btn = document.getElementById("btnSaveNew");
  btn.disabled = false;
  btn.innerText = translations[currentLang].btnSaveNew;
  
  if (res.status === "success") {
    closeAddModal();
    showInfoModal(currentLang === "th" ? "สำเร็จ" : "Success", currentLang === "th" ? "ลงทะเบียนอะไหล่ชิ้นใหม่เรียบร้อยแล้ว" : "components register successfully", "✅");
    loadData();
  } else { showInfoModal(currentLang === "th" ? "ล้มเหลว" : "Failed", res.message, "❌"); }
}

function openModal(item) {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("edit_original_id").value = item["ID"];
  document.getElementById("edit_id").value = item["ID"];
  document.getElementById("edit_part").value = item["Part Number"] || "";
  document.getElementById("edit_model").value = item["Model"] || "";
  document.getElementById("edit_machine").value = item["Machine"] || "";
  document.getElementById("edit_category").value = item["Category"] || "";
  document.getElementById("edit_price").value = item["Price"] || 0;
  document.getElementById("edit_detail").value = item["Detail"] || "";
  document.getElementById("adj_quantity").value = item["Quantity"] || 0;
  document.getElementById("edit_file_status").classList.add("hidden");
  
  const adminPanel = document.getElementById("adminStockControl");
  const zoneDelete = document.getElementById("zoneDelete");
  const zoneAdjust = document.getElementById("zoneAdjust");
  
  if (userRole >= 1) { 
    adminPanel.classList.remove("hidden");
    adminPanel.classList.add("flex");
    if (userRole === 1) {
      if (zoneDelete) zoneDelete.classList.add("hidden");
      if (zoneAdjust) zoneAdjust.classList.remove("hidden");
    } else if (userRole === 2) {
      if (zoneDelete) { zoneDelete.classList.remove("hidden"); zoneDelete.classList.add("flex"); }
      if (zoneAdjust) zoneAdjust.classList.remove("hidden");
    }
  } else {
    adminPanel.classList.add("hidden");
    adminPanel.classList.remove("flex");
  }
}

function closeModal() { document.getElementById("modal").classList.add("hidden"); }

function openAddModal() { 
  document.getElementById("addModal").classList.remove("hidden");
  document.getElementById("add_id").value = ""; document.getElementById("add_model").value = ""; document.getElementById("add_part").value = "";
  document.getElementById("add_machine").value = ""; document.getElementById("add_category").value = ""; document.getElementById("add_price").value = "";
  document.getElementById("add_detail").value = ""; document.getElementById("add_quantity").value = "0"; document.getElementById("add_file").value = "";
}
function closeAddModal() { document.getElementById("addModal").classList.add("hidden"); }

function openGuestModal() { 
  document.getElementById("guestModal").classList.remove("hidden"); 
  document.getElementById("guest_name_input").value = ""; document.getElementById("trans_line_input").value = "";
  document.getElementById("guest_name_input").focus(); 
}
function closeGuestModal() { document.getElementById("guestModal").classList.add("hidden"); }

function showInfoModal(title, message, icon = "✅") {
  document.getElementById("infoIcon").innerText = icon;
  document.getElementById("infoTitle").innerText = title;
  document.getElementById("infoMessage").innerText = message;
  document.getElementById("infoModal").classList.remove("hidden");
}
function closeInfoModal() { document.getElementById("infoModal").classList.add("hidden"); }

function login() {
  document.getElementById("loginModal").classList.remove("hidden");
  document.getElementById("login_user").value = "";
  document.getElementById("login_pass").value = "";
  document.getElementById("login_user").focus();
}
function closeLoginModal() { document.getElementById("loginModal").classList.add("hidden"); }

async function submitLogin() {
  const user = document.getElementById("login_user").value;
  const pass = document.getElementById("login_pass").value;
  const btn = document.getElementById("btnSubmitLogin");
  
  if (!user || !pass) return showInfoModal(currentLang === "th" ? "แจ้งเตือน" : "Warning", currentLang === "th" ? "กรุณากรอก Username และ Password ให้ครบถ้วน" : "Please Enter Username and Password correctly", "⚠️");
  
  btn.disabled = true;
  btn.innerText = currentLang === "th" ? "⏳ กำลังตรวจสอบ..." : "⏳ Verification...";
  
  const res = await fetchAPI('checkLogin', { username: user, password: pass });
  
  btn.disabled = false;
  btn.innerText = translations[currentLang].btnSubmitLogin;
  
  if (res.status === "success") {
    sessionStorage.setItem("bpc_role", res.role);
    sessionStorage.setItem("bpc_name", res.name);
    
    userRole = parseInt(res.role);
    currentUserName = res.name;

    applyLoginUI(res.name, userRole); 
    closeLoginModal();
    
    const welcomeMsg = currentLang === "th" ? `เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับคุณ ${res.name}` : `Authentication pass! Welcome member ${res.name}`;
    showInfoModal(currentLang === "th" ? "ยินดีต้อนรับ" : "Welcome", welcomeMsg, "🎉");
    loadData();
  } else { showInfoModal(currentLang === "th" ? "เข้าสู่ระบบล้มเหลว" : "Login Failed", res.message, "❌"); }
}

function applyLoginUI(name, role) {
  const t = translations[currentLang];
  document.getElementById("displayUserName").innerText = t.statusUser + name;
  document.getElementById("loginBtn").classList.add("hidden"); document.getElementById("logoutBtn").classList.remove("hidden");
  document.getElementById("historyBtn").classList.add("hidden"); document.getElementById("addBtn").classList.add("hidden");
  if (role === 1) { document.getElementById("addBtn").classList.remove("hidden"); } 
  else if (role === 2) { document.getElementById("addBtn").classList.remove("hidden"); document.getElementById("historyBtn").classList.remove("hidden"); }
}

function checkSession() {
  const savedRole = sessionStorage.getItem("bpc_role");
  const savedName = sessionStorage.getItem("bpc_name");
  if (savedRole && savedName) {
    userRole = parseInt(savedRole); currentUserName = savedName; applyLoginUI(currentUserName, userRole);
  }
}

function logout() {
  sessionStorage.removeItem("bpc_role"); sessionStorage.removeItem("bpc_name");
  userRole = 0; currentUserName = "Guest"; currentPage = 1; currentCategoryFilter = "";
  document.getElementById("search").value = "";

  const btns = ['all', 'E', 'M', 'X'];
  btns.forEach(b => {
    const btnEl = document.getElementById('btn-cat-' + b);
    if (btnEl) {
      if (b === 'all') btnEl.className = "px-4 py-2 rounded-xl text-xs md:text-sm font-bold bg-blue-600 text-white shadow-sm transition-all border border-transparent";
      else btnEl.className = "px-4 py-2 rounded-xl text-xs md:text-sm font-bold bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 shadow-sm transition-all";
    }
  });

  if (window.history.replaceState) {
    const newUrl = new URL(window.location); newUrl.searchParams.delete('search'); window.history.replaceState({}, '', newUrl);
  }

  updateStaticLanguageUI();
  document.getElementById("addBtn").classList.add("hidden"); document.getElementById("historyBtn").classList.add("hidden");
  document.getElementById("logoutBtn").classList.add("hidden"); document.getElementById("loginBtn").classList.remove("hidden");
  loadData();
}

function updatePaginationUI(totalPages) {
  const container = document.getElementById("pagination-container");
  const info = document.getElementById("total-info");
  const t = translations[currentLang];
  
  container.innerHTML = "";
  if (info) info.innerText = totalPages > 0 ? t.pageInfo.replace("{current}", currentPage).replace("{total}", totalPages) : "";
  if (totalPages <= 1) return;
  
  const createBtn = (text, target, disabled, active) => {
    const btn = document.createElement("button"); btn.innerText = text; btn.disabled = disabled;
    btn.className = `px-3.5 py-1.5 rounded-xl font-bold border text-xs transition-all ${ active ? 'bg-blue-600 text-white border-blue-600 shadow-sm shadow-blue-100' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'} ${disabled ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer active:scale-95'}`;
    if (!disabled && !active) { btn.onclick = () => { currentPage = target; loadData(); window.scrollTo({ top: 0, behavior: 'smooth' }); }; }
    return btn;
  };
  
  container.appendChild(createBtn(t.pagePrev, currentPage - 1, currentPage === 1, false));
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) { container.appendChild(createBtn(i.toString(), i, false, i === currentPage)); }
  container.appendChild(createBtn(t.pageNext, currentPage + 1, currentPage === totalPages, false));
}

async function niceConfirm(title, message, icon = "❓") {
  document.getElementById("confirmTitle").innerText = title; document.getElementById("confirmMessage").innerText = message; document.getElementById("confirmIcon").innerText = icon;
  document.getElementById("confirmModal").classList.remove("hidden");
  return new Promise((resolve) => {
    resolveConfirm = resolve;
    document.getElementById("btnConfirmYes").onclick = () => { document.getElementById("confirmModal").classList.add("hidden"); resolve(true); };
  });
}
function closeConfirmModal() { document.getElementById("confirmModal").classList.add("hidden"); if (resolveConfirm) resolveConfirm(false); }

let currentHistoryPage = 1;
function openHistoryModal() { document.getElementById("historyModal").classList.remove("hidden"); currentHistoryPage = 1; loadHistory(currentHistoryPage); }
function closeHistoryModal() { document.getElementById("historyModal").classList.add("hidden"); }

async function loadHistory(page = 1) {
  const tbody = document.getElementById("historyTableBody");
  const loading = document.getElementById("historyLoading");
  const paginationContainer = document.getElementById("historyPagination");
  
  tbody.innerHTML = ""; paginationContainer.innerHTML = "";
  loading.classList.remove("hidden"); loading.classList.add("flex");
  
  const res = await fetchAPI('getTransactionHistory', { page: page });
  
  loading.classList.add("hidden"); loading.classList.remove("flex");
  
  if (res.status === "success") {
    let html = "";
    res.data.forEach(item => {
      let typeStyle = "text-gray-600"; let typeIcon = "📌";
      if (item.type === "IN") { typeStyle = "text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md"; typeIcon = "📥 รับเข้า"; }
      else if (item.type === "OUT") { typeStyle = "text-rose-600 bg-rose-50 px-2 py-1 rounded-md"; typeIcon = "📤 เบิกออก"; }
      else if (item.type === "ADJUST") { typeStyle = "text-orange-600 bg-orange-50 px-2 py-1 rounded-md"; typeIcon = "🔧 ปรับยอด"; }
      else if (item.type === "DELETE") { typeStyle = "text-red-600 bg-red-50 px-2 py-1 rounded-md"; typeIcon = "🗑️ ลบพาร์ท"; }

      html += `<tr class="hover:bg-gray-50/80 transition-colors">
        <td class="p-3 text-xs text-gray-500">${item.timestamp}</td><td class="p-3 font-semibold text-gray-700">${item.user}</td>
        <td class="p-3 font-bold text-xs"><span class="${typeStyle}">${typeIcon}</span></td><td class="p-3 font-mono text-xs text-blue-600 font-bold">${item.id}</td>
        <td class="p-3 truncate max-w-[200px]" title="${item.model}">${item.model}</td><td class="p-3 font-bold text-indigo-600 text-xs text-center">${item.line || '-'}</td>
        <td class="p-3 font-bold text-center bg-gray-50/50 text-slate-800">${item.qty}</td></tr>`;
    });
    tbody.innerHTML = html || `<tr><td colspan="7" class="text-center py-8 text-gray-400 font-medium">ไม่มีข้อมูลประวัติในระบบ</td></tr>`;
    renderHistoryPagination(res.currentPage, res.totalPages);
  } else { tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-red-500">Error: ${res.message}</td></tr>`; }
}

function renderHistoryPagination(currentPage, totalPages) {
  const container = document.getElementById("historyPagination");
  if (totalPages <= 0) return;
  let prevDisabled = currentPage === 1 ? "opacity-30 cursor-not-allowed" : "hover:bg-indigo-50 hover:text-indigo-600 cursor-pointer active:scale-95";
  let nextDisabled = currentPage === totalPages ? "opacity-30 cursor-not-allowed" : "hover:bg-indigo-50 hover:text-indigo-600 cursor-pointer active:scale-95";
  let labelPage = currentLang === "th" ? "หน้า" : "Page";
  let labelPrev = currentLang === "th" ? "ย้อนกลับ" : "Prev";
  let labelNext = currentLang === "th" ? "ถัดไป" : "Next";
  container.innerHTML = `
    <div class="text-xs text-gray-500 font-bold tracking-wide">${labelPage} ${currentPage} / ${totalPages}</div>
    <div class="flex gap-2">
      <button onclick="${currentPage > 1 ? `loadHistory(${currentPage - 1})` : ''}" class="px-4 py-2.5 border border-gray-200 rounded-xl text-xs font-bold text-gray-600 shadow-sm transition-all ${prevDisabled}">◀ ${labelPrev}</button>
      <button onclick="${currentPage < totalPages ? `loadHistory(${currentPage + 1})` : ''}" class="px-4 py-2.5 border border-gray-200 rounded-xl text-xs font-bold text-gray-600 shadow-sm transition-all ${nextDisabled}">${labelNext} ▶</button>
    </div>`;
}

document.getElementById("login_pass").onkeypress = e => { if(e.key === "Enter") submitLogin(); };
</script>
</body>
